name: Sync 0xWork verified + deploy

# Keeps Feedr's 0xWork verified list in sync with 0xwork.org/launches.
# Their public API is CORS-locked to 0xwork.org, so the browser can't read it at
# runtime — instead we re-pull it here on a schedule, rebuild the data, rebuild
# the site, and deploy to GitHub Pages end-to-end with no manual step.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
    inputs:
      full_reindex:
        description: "Also run the full on-chain launch reindex (~30 min, flaky public RPC)"
        type: boolean
        default: false

# GITHUB_TOKEN needs write access to commit refreshed data and push to gh-pages.
# (No personal access token required — do NOT add one.)
permissions:
  contents: write

# Don't let two scheduled runs deploy on top of each other.
concurrency:
  group: sync-0xwork-deploy
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Always build from the current tip of main — never a stale/other ref.
        # fetch-depth:0 gives the data-commit step full history so it can rebase
        # onto any human push that landed mid-run instead of failing or clobbering.
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # npm install (not ci) so a committed lockfile that's out of sync with
        # package.json — e.g. missing platform-specific optional deps generated on
        # another OS — doesn't hard-fail the scheduled job.
        run: npm install --no-audit --no-fund

      # Optional, manual-only: rebuild launches.json from the on-chain hook index.
      # Skipped on the schedule because it takes ~30 min on the public RPC and is
      # unrelated to the 0xWork verified sync (the pull step below merges verified
      # tokens into launches.json regardless).
      - name: Full on-chain reindex (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reindex }}
        run: npm run index:launches
        env:
          BASE_RPC: ${{ secrets.BASE_RPC }} # optional: a faster RPC if configured

      # Re-pull the 0xWork verified launches (API ∪ server-rendered page) →
      # src/data/verified.json, and merge any missing verified token into
      # src/data/launches.json.
      - name: Pull 0xWork verified list
        run: npm run pull:verified

      # Pull the Clanker live-pool set (Clanker API + v4 factory) →
      # src/data/clanker.json, merged into launches.json with source:"clanker".
      # Recent window + persisted set: fast, no deep RPC scan.
      - name: Pull Clanker tokens
        run: npm run pull:clanker

      # Rebuild the 0xWork agent roster snapshot (src/data/agents.json).
      - name: Rebuild agents.json
        run: npm run gen:agents

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/verified.json src/data/clanker.json src/data/launches.json src/data/agents.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): sync 0xWork verified + Clanker [skip ci]"
            # Rebase onto any push that landed during the run so we integrate
            # committed work rather than racing/overwriting it, then push.
            git pull --rebase --autostash origin main
            git push
          fi

      # Build the static site (data is already fresh, so call vite directly to
      # avoid the prebuild chain re-running the heavy indexer).
      - name: Build site
        run: npx vite build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
